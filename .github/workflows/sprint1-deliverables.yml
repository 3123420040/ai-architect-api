name: Sprint 1 Deliverables

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  PYTHONPATH: .
  ODA_FILE_CONVERTER_BIN: /usr/bin/ODAFileConverter

jobs:
  sprint1-2d-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install ODA File Converter
        env:
          ODA_DEB_URL: ${{ vars.ODA_DEB_URL }}
        run: |
          test -n "$ODA_DEB_URL"
          sudo apt-get update
          sudo apt-get install -y \
            wget \
            xvfb \
            libdbus-1-3 \
            libegl1 \
            libfontconfig1 \
            libglib2.0-0 \
            libgl1 \
            libgtk-3-0 \
            libice6 \
            libsm6 \
            libx11-xcb1 \
            libxcomposite1 \
            libxdamage1 \
            libxext6 \
            libxi6 \
            libxrandr2 \
            libxrender1 \
            libopengl0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-shm0 \
            libxcb-sync1 \
            libxcb-util1 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxkbcommon-x11-0
          wget -q "$ODA_DEB_URL" -O /tmp/oda.deb
          sudo apt-get install -y /tmp/oda.deb || sudo dpkg -i /tmp/oda.deb || true
          sudo apt-get install -f -y
          which ODAFileConverter

      - name: Generate golden 2D bundle and run gates
        run: make sprint1-ci

      - name: Upload Sprint 1 gate summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sprint1-gate-summary
          path: storage/professional-deliverables/project-golden-townhouse/2d/sprint1_gate_summary.md
          if-no-files-found: ignore

      - name: Comment Sprint 1 gate summary
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: sprint1-deliverables
          path: storage/professional-deliverables/project-golden-townhouse/2d/sprint1_gate_summary.md
