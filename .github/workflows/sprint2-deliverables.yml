name: Sprint 2 Deliverables

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  PYTHONPATH: .
  BLENDER_BIN: /opt/blender/blender
  KTX_BIN: /usr/bin/ktx
  GLTF_TRANSFORM_BIN: ${{ github.workspace }}/tools/sprint2/node_modules/.bin/gltf-transform

jobs:
  sprint2-3d-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: tools/sprint2/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Sprint 2 Node tools
        run: npm ci --prefix tools/sprint2

      - name: Install Blender 4.5.1 LTS
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            curl \
            xz-utils \
            libdbus-1-3 \
            libegl1 \
            libfontconfig1 \
            libglib2.0-0 \
            libgl1 \
            libice6 \
            libsm6 \
            libx11-6 \
            libx11-xcb1 \
            libxext6 \
            libxi6 \
            libxkbcommon0 \
            libxrender1 \
            libxxf86vm1
          curl -fsSL https://download.blender.org/release/Blender4.5/blender-4.5.1-linux-x64.tar.xz -o /tmp/blender.tar.xz
          sudo mkdir -p /opt/blender
          sudo tar -xf /tmp/blender.tar.xz -C /opt/blender --strip-components=1
          /opt/blender/blender --background --version

      - name: Install KTX-Software 4.4.2
        run: |
          curl -fsSL https://github.com/KhronosGroup/KTX-Software/releases/download/v4.4.2/KTX-Software-4.4.2-Linux-x86_64.deb -o /tmp/ktx.deb
          sudo apt-get install -y /tmp/ktx.deb || sudo dpkg -i /tmp/ktx.deb || true
          sudo apt-get install -f -y
          if command -v ktx; then
            echo "KTX_BIN=$(command -v ktx)" >> "$GITHUB_ENV"
            ktx --version
          elif command -v toktx; then
            echo "KTX_BIN=$(command -v toktx)" >> "$GITHUB_ENV"
            toktx --version
          else
            echo "No KTX CLI found" >&2
            exit 1
          fi

      - name: Generate golden 3D bundle and run gates
        run: make sprint2-ci

      - name: Upload Sprint 2 gate summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sprint2-gate-summary
          path: |
            storage/professional-deliverables/project-golden-townhouse/3d/sprint2_gate_summary.md
            storage/professional-deliverables/project-golden-townhouse/3d/sprint2_gate_summary.json
            storage/professional-deliverables/project-golden-townhouse/3d/gltf-validator-report.json
            storage/professional-deliverables/project-golden-townhouse/3d/fbx-import-report.json
          if-no-files-found: ignore

      - name: Comment Sprint 2 gate summary
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: sprint2-deliverables
          path: storage/professional-deliverables/project-golden-townhouse/3d/sprint2_gate_summary.md
